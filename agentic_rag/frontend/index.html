<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SalesIntel AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
  <!-- Top Navigation -->
  <nav class="navbar">
    <div class="nav-left">
      <a href="#" class="nav-brand" onclick="navigate('home')">SalesIntel<span>AI</span></a>
    </div>
    <div class="nav-right">
      <a href="#" class="nav-link" onclick="navigate('internal')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/></svg>
        Internal Dashboard
      </a>
      <a href="#" class="nav-link" onclick="navigate('history')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        History
      </a>

      <div class="user-avatar">
        <img src="https://ui-avatars.com/api/?name=User&background=2563eb&color=fff" alt="User" />
      </div>
    </div>
  </nav>

  <main id="app-container" class="container">
    <!-- View content injected here via JS -->
  </main>

  <!-- Templates -->
  
  <!-- 1. Home View -->
  <template id="view-home">
    <div class="home-wrapper">
      <div class="hero-section">
        <div class="hero-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </div>
        <h1 class="hero-title">SalesIntel <span>AI</span></h1>
        <p class="hero-subtitle">Enter a target account name to instantly generate AI-powered sales intelligence, opportunity mapping, and deal coaching.</p>
        
        <form class="search-form" id="analyzeForm" onsubmit="handleAnalyze(event)">
          <div class="search-input-wrapper">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input type="text" id="companySearch" class="search-input" placeholder="Search company name... (e.g. Asian Paints, Zoho)" required autocomplete="off"/>
            <button type="submit" class="btn btn-primary" id="analyzeBtn">Analyze</button>
          </div>
        </form>

        <div class="drop-zone">
          <div class="drop-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </div>
          <h3>Drag & Drop files here</h3>
          <p>Optional — upload contracts, RFP responses, or transcripts for instant synthesis.</p>
        </div>
      </div>
    </div>
  </template>

  <!-- 2. Loading View -->
  <template id="view-loading">
    <div class="loading-wrapper">
      <div class="spinner"></div>
      <h2 id="loadingStatus">Aggregating real-time data...</h2>
      <p>Researching company dossiers, news, and internal vectors.</p>
    </div>
  </template>

  <!-- 3. Internal Dashboard View -->
  <template id="view-internal">
    <div class="dashboard-wrapper">
      <div class="dashboard-header">
        <div class="dashboard-title-group">
          <div class="badge"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Internal Executive Dashboard</div>
          <h1>NovaChem Solutions Pvt Ltd</h1>
          <p>Advanced Chemical & Industrial Solutions for Sustainable Manufacturing</p>
        </div>
      </div>

      <div class="stats-grid" id="internalStats">
        <!-- Injected via JS -->
      </div>

      <div class="grid-2-col mt-4">
        <div class="card">
          <div class="card-header">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <h3>Product Portfolio</h3>
          </div>
          <div class="card-body" id="portfolioList">
            <!-- Injected via JS -->
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            <h3>Top Selling Solutions</h3>
          </div>
          <div class="card-body">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Product Name</th>
                  <th>Opportunities</th>
                  <th class="text-right">Estimated Revenue Impact</th>
                </tr>
              </thead>
              <tbody id="topSolutionsBody">
                <!-- Injected via JS -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- 4. Company Details Dashboard -->
  <template id="view-details">
    <div class="dashboard-wrapper">
      <div class="dashboard-header">
        <h1 id="detCompanyTitle">Company Analysis Dashboard</h1>
      </div>

      <div class="grid-2-col top-widgets">
        <div class="card flex-center widget-card">
          <div class="circular-progress" id="stratFitGauge">
            <div class="inner-circle"><span id="stratFitValue">0%</span></div>
          </div>
          <div class="widget-text">
            <h3>Strategic Fit</h3>
            <p>Alignment Probability</p>
          </div>
        </div>
        <div class="card widget-card">
          <h3 class="mb-4">Next Steps</h3>
          <div class="action-buttons">
            <button class="btn btn-outline-success" onclick="showTab('dealCoachTab', 'prepContent')">Meeting Prep & QBR</button>
            <button class="btn btn-primary" onclick="showTab('dealCoachTab', 'coachContent')">Deal Coach Chat</button>
          </div>
        </div>
      </div>

      <div class="grid-2-col mt-4">
        <div class="card">
          <div class="card-header">
            <svg class="text-accent" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>
            <h3>Intelligence Overview</h3>
          </div>
          <div class="card-body text-body" id="detOverview">
            <!-- Injected via JS -->
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <svg class="text-accent-2" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <h3>AI Needs Prediction</h3>
          </div>
          <div class="card-body text-body">
            <ul class="bullet-list" id="detNeeds">
              <!-- Injected via JS -->
            </ul>
          </div>
        </div>
      </div>

      <div class="card mt-4">
        <div class="card-header justify-between">
          <div class="flex items-center gap-2">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <h3>AI Solution Mapping Engine</h3>
          </div>
          <button class="btn btn-sm btn-ghost">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export Mapping
          </button>
        </div>
        <div class="card-body p-0">
          <table class="data-table">
            <thead>
              <tr>
                <th>THEIR REQUIREMENT</th>
                <th>OUR SOLUTION</th>
                <th>MATCH %</th>
                <th>EST. DEAL VALUE</th>
                <th>ACTION</th>
              </tr>
            </thead>
            <tbody id="detSolutions">
              <!-- Injected via JS -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- Tabs Area -->
      <div class="tabs-container mt-4" id="dealCoachTab">
        <div class="tab-header">
          <button class="tab-btn active" onclick="switchTab(this, 'prepContent')">Meeting Preparation</button>
          <button class="tab-btn" onclick="switchTab(this, 'coachContent')">AI Sales Copilot Workspace</button>
        </div>
        
        <div class="tab-content active" id="prepContent">
          <div class="grid-2-col">
            <!-- Exec QBR -->
            <div class="card bg-panel">
              <h3 class="section-title">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                Executive QBR
              </h3>
              
              <h4 class="sub-label">KEY BUSINESS PRIORITIES</h4>
              <ul class="bullet-list mb-4" id="prepPriorities"></ul>
              
              <h4 class="sub-label">GROWTH INITIATIVES</h4>
              <ul class="bullet-list mb-4" id="prepGrowth"></ul>
              
              <h4 class="sub-label">RISK FACTORS</h4>
              <ul class="bullet-list mb-4 text-warning" id="prepRisks"></ul>
              
              <h4 class="sub-label">BUYING SIGNALS</h4>
              <ul class="bullet-list" id="prepSignals"></ul>
            </div>

            <!-- Meeting Prep -->
            <div class="card bg-panel">
              <h3 class="section-title text-success">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                Meeting Preparation
              </h3>
              
              <h4 class="sub-label text-warning">POTENTIAL OBJECTIONS</h4>
              <ul class="bullet-list mb-4" id="prepObjections"></ul>
              
              <h4 class="sub-label">STAKEHOLDERS TO TARGET</h4>
              <ul class="bullet-list" id="prepStakeholders"></ul>
            </div>
          </div>
        </div>
        
        <div class="tab-content" id="coachContent">
          <div class="grid-2-col">
            <div class="card bg-panel chat-container">
              <h3 class="section-title">
                <svg class="text-accent" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                AI Deal Coach <span class="status-indicator online">Online</span>
              </h3>
              <div class="chat-messages" id="coachChatMessages">
                <div class="msg assistant">
                  Based on my analysis, here is the recommended pitch strategy:<br><br>
                  Highlight how our <strong>NovaPredict Edge</strong> aligns perfectly with their digital transformation priorities, backed by our previous case study successes. Address their budget constraints early by offering a phased rollout plan.
                </div>
              </div>
              <div class="chat-input-area">
                <input type="text" id="coachChatInput" placeholder="Ask about pricing strategy, objection handling..." class="chat-input"/>
                <button id="coachChatSend" class="chat-send">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
              </div>
            </div>
            
            <div class="card bg-panel doc-container">
              <h3 class="section-title">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                Generated Documents
              </h3>
              <div class="doc-status mb-4">
                <h4 class="sub-label">STATUS</h4>
                <p id="docStatus" class="text-muted text-sm">No documents generated yet. Use the buttons below.</p>
              </div>
              <div class="doc-list" id="docList">
                <h4 class="sub-label">RECENT FILES</h4>
                <div class="doc-item">
                  <span>Proposal - Template</span>
                  <div class="doc-formats"><span>DOCX</span><span>PDF</span></div>
                </div>
              </div>
              <div class="doc-actions mt-auto">
                <h4 class="sub-label">Generate Deliverables</h4>
                <button id="generateProposalBtn" class="btn btn-primary w-full mt-2">Generate Proposal</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </template>
  <!-- 5. History View -->
  <template id="view-history">
    <div class="dashboard-wrapper">
      <div class="dashboard-header">
        <div class="dashboard-title-group">
          <h1>Search History</h1>
          <p>Quick access to your previously analyzed companies</p>
        </div>
      </div>
      <div class="card mt-4">
        <table class="data-table">
          <thead>
            <tr>
              <th>Company Name</th>
              <th>Date Analyzed</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="historyList">
            <!-- Injected via JS -->
          </tbody>
        </table>
      </div>
    </div>
  </template>
  <script src="/static/app.js"></script>
</body>
</html>
